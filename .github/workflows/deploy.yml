name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

# ここに環境変数を追加して、Node.js 24への移行を先取りします
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # v4でも動きますが、最新に合わせるならそのまま
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # ここを20から24に変更
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4